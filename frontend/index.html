<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оставить заявку</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Оставить заявку</a>
                <a href="admin.html" class="nav-link">Панель управления</a>
            </div>
            <div class="theme-toggle" id="themeToggle" title="Переключить тему">
                <span class="theme-label" id="themeLabel">Тема</span>
                <div class="toggle-track">
                    <div class="toggle-thumb" id="toggleThumb">☀️</div>
                </div>
            </div>
        </nav>

        <div class="form-container">
            <h1>Оставить заявку</h1>

            <div id="messages"></div>

            <form id="applicationForm">
                <div class="form-group">
                    <label for="phone">Номер телефона *</label>
                    <input type="text" id="phone" name="phone" placeholder="+7 (999) 999-99-99" required>
                    <small class="help-text">Формат: +7XXXXXXXXXX или 8XXXXXXXXXX</small>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label for="last_name">Фамилия *</label>
                    <input type="text" id="last_name" name="last_name" required>
                </div>
                <div class="form-group">
                    <label for="first_name">Имя *</label>
                    <input type="text" id="first_name" name="first_name" required>
                </div>
                <div class="form-group">
                    <label for="patronymic">Отчество *</label>
                    <input type="text" id="patronymic" name="patronymic" required>
                </div>
                <div class="form-group">
                    <label for="organization">Наименование организации *</label>
                    <input type="text" id="organization" name="organization" required>
                </div>
                <button type="submit" class="btn btn-primary">Отправить заявку</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
